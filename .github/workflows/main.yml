name: CI/CD workflow

env:
  SERVER_IP: "141.227.151.70"
  SERVER_USER: "root"

on:
  push:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: checkout le code
        uses: actions/checkout@v6
      - name: installer node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: install dependencies
        run: npm ci --cache .npm --prefer-offline
      - name: vérifie le code
        run: npm run lint
      - name: vérifie les vulnerabilités des dépendances
        run: npm audit
      - name: éxécuter les tests
        run: npm run test:ci
  deploy:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout le code
        uses: actions/checkout@v6
      - name: déployer sur le serveur
        run: |
          eval $(ssh-agent -s)
          ssh-add - <<< ${{ secrets.SSH_KEY_VPS }}
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts
          scp -r ./server $SERVER_USER@$SERVER_IP:/var/www
          ssh $SERVER_USER@$SERVER_IP "cd /var/www/server && npm install --omit=dev"
          ssh $SERVER_USER@$SERVER_IP "cd /var/www/server && pm2 startOrRestart ecosystem.config.js --env production && pm2 save"